font_family Hack Nerd Font
cursor #c77dff
cursor_shape beam
cursor_beam_thickness 5
cursor_trail 3
cursor_trail_decay 0.08 0.25
cursor_trail_start_threshold 1
cursor_trail_color none
shell zsh
window_padding_width 15
confirm_os_window_close 0
hide_window_decorations yes
linux_display_server wayland

shadow-radius = 20;
shadow-opacity = 0.35;
shadow-color = "#9d4edd";


background #0b0613
foreground #e0d3ff

color0  #1a1126
color1  #ff4d6d
color2  #9d4edd
color3  #c77dff
color4  #7b2cbf
color5  #9d4edd
color6  #00f5d4
color7  #ffffff
