animations {
    enabled = true

    bezier = smooth, 0.25, 0.9, 0.1, 1.0
    bezier = soft, 0.22, 1, 0.36, 1
    bezier = workspace, 0.25, 0.9, 0.1, 1.0

    animation = windows, 1, 7, smooth, popin 85%
    animation = windowsOut, 1, 6, smooth, popin 85%
