# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 12
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.75
    inactive_opacity = 0.76

    shadow {
        enabled = true
        range = 28
        render_power = 4
        color = rgba(bb00ff88)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.25
    }
}
